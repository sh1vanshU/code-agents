pluginGroup = com.codeagents.plugin
pluginName = Code Agents
pluginVersion = 1.0.0

# Platform SDK: auto-detects local IntelliJ installation first.
# If no local IDE found, downloads this version from Maven.
platformType = IC
platformVersion = 2025.1.3

# Override: force a specific local IDE path (uncomment if auto-detect fails)
# platformLocalPath = /Applications/IntelliJ IDEA.app/Contents

# SSL trust: gradlew auto-detects local cacerts or macOS Keychain
org.gradle.jvmargs = -Xmx2g
kotlin.stdlib.default.dependency = false
