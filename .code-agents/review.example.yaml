# Code Review Configuration — per-repo settings
# Copy to .code-agents/review.yaml in your repo

# Review strictness: strict, standard, lenient
strictness: standard

# Files/patterns to skip during review
ignore_patterns:
  - "*.generated.java"
  - "*.g.dart"
  - "**/target/**"
  - "**/build/**"
  - "**/node_modules/**"
  - "**/*.min.js"

# Focus areas (prioritize these in findings)
focus_areas:
  - security
  - null-safety
  - error-handling
  - performance
  - thread-safety

# Maximum findings per review (prevent noise)
max_findings: 20

# Auto-approve changes that only touch these paths
auto_approve:
  - "docs/**"
  - "*.md"
  - ".gitignore"
  - "*.yml"
  - "*.yaml"

# Severity threshold to block merge
# Only findings at or above this level trigger REQUEST_CHANGES
block_severity: HIGH  # CRITICAL, HIGH, MEDIUM, LOW
