# MCP Server Configuration
# Copy to ~/.code-agents/mcp.yaml (global) or .code-agents/mcp.yaml (per-repo)
#
# Servers can use stdio (command + args) or HTTP SSE (url) transport.
# Restrict to specific agents with the 'agents' field (empty = all agents).

