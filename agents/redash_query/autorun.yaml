allow:
  - "http://127.0.0.1"
  - "http://localhost"
  - "/redash/data-sources"
  - "/redash/run-saved-query"
  - "/redash/run-query"
  - "cat "
  - "ls "
  - "grep "
  - "find "
block:
  - "rm "
  - "git push"
  - "-X DELETE"
  - "DROP "
  - "DELETE FROM"
  - "TRUNCATE "
  - "INSERT "
  - "UPDATE "
  - "http://"
  - "https://"
