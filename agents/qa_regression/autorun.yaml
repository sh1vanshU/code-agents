allow:
  - "http://127.0.0.1"
  - "http://localhost"
  - "/testing/coverage"
  - "/testing/gaps"
  - "pytest"
  - "mvn test"
  - "./gradlew test"
  - "npm test"
  - "go test"
  - "cat "
  - "ls "
  - "grep "
  - "find "
  - "git diff"
  - "git status"
  - "git log"
  - "git branch"
  - "git add"
  - "git commit"
  - "git checkout -b"
block:
  - "rm "
  - "git push"
  - "git merge"
  - "git rebase"
  - "git reset --hard"
  - "-X DELETE"
  - "http://"
  - "https://"
