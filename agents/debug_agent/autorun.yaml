# Debug Agent — auto-run rules
allow:
  - "pytest *"
  - "python -m pytest *"
  - "python -c *"
  - "npm test *"
  - "npx jest *"
  - "go test *"
  - "cargo test *"
  - "mvn test *"
  - "gradle test *"
  - "make test*"
  - "git diff *"
  - "git log *"
  - "git blame *"
  - "git show *"
  - "cat *"
  - "head *"
  - "tail *"
  - "grep *"
  - "find *"
  - "wc *"
  - "ls *"

deny:
  - "rm -rf *"
  - "git push *"
  - "git reset --hard *"
  - "sudo *"
  - "chmod *"
  - "curl *"
  - "wget *"
