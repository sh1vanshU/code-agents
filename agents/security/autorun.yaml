allow:
  - "cat "
  - "ls "
  - "grep "
  - "find "
  - "git log"
  - "git diff"
  - "git status"
  - "git show"
  - "git blame"
  - "pip audit"
  - "npm audit"
  - "pip list"
  - "npm list"
block:
  - "rm "
  - "git push"
  - "git checkout"
  - "git reset"
  - "curl "
  - "wget "
  - "http://"
  - "https://"
