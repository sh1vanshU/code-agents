allow:
  - "http://127.0.0.1"
  - "http://localhost"
  - "/testing/coverage"
  - "/testing/gaps"
  - "/testing/run"
  # Python test & coverage
  - "poetry run pytest"
  - "poetry run python -m pytest"
  - "poetry run coverage"
  - "python -m pytest"
  - "pytest"
  # Java test & coverage
  - "mvn test"
  - "mvn verify"
  - "mvn clean test"
  - "gradle test"
  # JS test
  - "npm test"
  - "npx jest"
  # Go test
  - "go test"
  # Read-only file ops (no redirects)
  - "ls "
  - "ls"
  - "find "
  - "grep "
  - "head "
  - "tail "
  - "wc "
  - "pwd"
  # File writing — ONLY to test directories
  - "cat > tests/"
  - "cat > test/"
  - "cat > src/test/"
  - "cat >> tests/"
  - "cat >> test/"
  - "cat >> src/test/"
  - "mkdir -p tests"
  - "mkdir -p test"
  - "mkdir -p src/test"
  - "mkdir -p src/test/java"
  # Reading files (cat without redirect)
  - "cat code_agents/"
  - "cat agents/"
  - "cat src/"
  - "cat tests/"
  - "cat test/"
  - "cat pyproject"
  - "cat pom.xml"
  - "cat package.json"
  - "cat go.mod"
  - "cat conftest"
  - "cat README"
  # Git read + stage/commit (no push)
  - "git diff"
  - "git log"
  - "git status"
  - "git branch"
  - "git add tests/"
  - "git add test/"
  - "git add src/test/"
  - "git add conftest"
  - "git add src/test/java/"
  - "git commit"
  - "git checkout -b"
  - "git show"
block:
  - "rm "
  - "git push"
  - "git merge"
  - "git rebase"
  - "git reset --hard"
  - "mvn deploy"
  - "-X DELETE"
  - "http://"
  - "https://"
  # Safety: never run coverage with --cov on full suite without scope
  - "pytest --cov ."
  - "pytest --cov=."
  # Block writing to non-test directories
  - "cat > src/main/"
  - "cat > code_agents/"
  - "cat > agents/"
  - "cat >> src/main/"
  - "cat >> code_agents/"
  # Block staging non-test files
  - "git add code_agents/"
  - "git add agents/"
  - "git add src/main/"
  - "git add -A"
  - "git add ."
